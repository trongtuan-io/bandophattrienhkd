<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập — Bản đồ phát triển HKD</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --ink: #1a1a2e;
            --ink-soft: #5c5c7a;
            --surface: #f5f5f0;
            --white: #ffffff;
            --red: #c0392b;
            --red-light: #fdecea;
            --green: #27864e;
            --accent: #2c5282;
            --accent-hover: #1e3a5f;
            --border: #d4d4cc;
            --radius: 6px;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background: var(--surface);
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-brand h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--ink);
        }

        .login-brand h1 span {
            color: var(--accent);
        }

        .login-brand p {
            color: var(--ink-soft);
            font-size: 14px;
            margin-top: 6px;
        }

        .login-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
        }

        .login-card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--ink-soft);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 15px;
            color: var(--ink);
            background: var(--surface);
            transition: border-color 0.15s;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent);
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: var(--white);
            border: none;
            border-radius: var(--radius);
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            margin-top: 6px;
        }

        .btn-login:hover {
            background: var(--accent-hover);
        }

        .flash-error {
            background: var(--red-light);
            color: var(--red);
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 18px;
            border-left: 3px solid var(--red);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-brand">
            <img src="/static/bidv.jpeg" alt="Logo BIDV" style="width: 200px; padding-bottom: 10px;">
            <h1>Bản đồ <span>phát triển HKD</span></h1>
            <p>Hệ thống quản lý hộ kinh doanh</p>
        </div>

        <div class="login-card">
            <h2>Đăng nhập</h2>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash-error">{{ message }}</div>
                {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group">
                    <label>Tên đăng nhập</label>
                    <input type="text" name="username" required autofocus autocomplete="username">
                </div>
                <div class="form-group">
                    <label>Mật khẩu</label>
                    <input type="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Đăng nhập</button>
            </form>
        </div>
    </div>
</body>
</html>
